; PlatformIO Project Configuration File
; CHOPP ESP32 — Protocolo BLE Industrial v2.3
; https://docs.platformio.org/page/projectconf.html
;
; CORREÇÕES v2.3:
;   - Removida dependência ESPAsyncWebServer do env lolin_c3_mini (causa WiFiServer.h)
;   - Adicionado lib_ignore = WebServer para bloquear inclusão indireta
;   - Adicionado AsyncTCP como dependência explícita
;   - Adicionado build_flags: -DASYNCWEBSERVER_REGEX -DNO_GLOBAL_WEBSERVER
;   - USAR_PAGINA_CONFIG desabilitado em config.h (módulo WiFi não usado em produção)

[platformio]
default_envs = lolin_c3_mini
;default_envs = esp32-s3-devkitc-1
;default_envs = esp32dev

; ── Lolin C3 Mini (padrão de produção) ───────────────────────────────────
[env:lolin_c3_mini]
platform = espressif32@6.4.0
board = lolin_c3_mini
framework = arduino

monitor_speed = 115200

lib_deps =
    esp32async/ESPAsyncWebServer
    esp32async/AsyncTCP
    miguelbalboa/MFRC522@^1.4.12
    Preferences

lib_ignore =
    WebServer

build_flags =
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
    -DPROTOCOLO_BLE_V23=1
    -DASYNCWEBSERVER_REGEX
    -DNO_GLOBAL_WEBSERVER

build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>

; ── ESP32-S3 DevKit ───────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
    -DPROTOCOLO_BLE_V23=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>

; ── ESP32 Dev (genérico) ──────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
    -DPROTOCOLO_BLE_V23=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>
