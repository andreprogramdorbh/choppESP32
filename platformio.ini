; PlatformIO Project Configuration File
; CHOPP ESP32 — Protocolo BLE Industrial v2.2
; https://docs.platformio.org/page/projectconf.html
;
; NOVIDADES v2.2:
;   - event_log.cpp/.h — log circular de 32 eventos em RAM
;   - command_parser.cpp — formato SERVE|ml|ID=XXXX, ACK|ID, DONE|ID|ml
;   - watchdog.cpp — WDG-3: restart advertising após 30s sem conexão BLE
;   - protocol.h — RESP_DUPLICATE, STRINGIFY, PROTO_BLE_WATCHDOG_MS

[platformio]
default_envs = lolin_c3_mini
;default_envs = esp32-s3-devkitc-1
;default_envs = esp32dev

; ── Lolin C3 Mini (padrão de produção) ───────────────────────────────────
[env:lolin_c3_mini]
platform = espressif32@6.4.0
board = lolin_c3_mini
framework = arduino
build_flags =
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
lib_deps =
    me-no-dev/ESPAsyncWebServer@^3.6.0
    miguelbalboa/MFRC522@^1.4.12
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>

; ── ESP32-S3 DevKit ───────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>

; ── ESP32 Dev (genérico) ──────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V22=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<event_log.cpp>
    +<event_log.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>
